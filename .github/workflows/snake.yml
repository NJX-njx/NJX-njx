name: Generate Snake Animation

on:
  # 每天自动运行
  schedule:
    - cron: "0 0 * * *"
  # 手动触发
  workflow_dispatch:
  # push 到 main/master 时触发
  push:
    branches: ["main", "master"]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Snake Game from GitHub Contributions
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: NJX-njx
          outputs: |
            dist/github-snake.svg?color_snake=#2A5D2D&color_dots=#EBF5E6,#C8EEC0,#95FF79,#5DA153,#2A5D2D&color_dot_border=#122A1230
            dist/github-snake-dark.svg?color_snake=#D8FFC4&color_dots=#070C07,#1A3D1D,#2A5D2D,#5DA153,#95FF79&color_dot_border=#68FF7E33

      - name: Add CRT progress percentage label
        run: python tools/add_snake_progress_label.py dist/github-snake.svg dist/github-snake-dark.svg

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
